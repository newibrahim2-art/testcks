<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>طباعة الشيكات المصرية | نظام احترافي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --g:#1a6b3a;--gl:#2d9358;--gp:#e8f5ee;
  --gold:#b8862e;--goldd:#f5c842;
  --dark:#0c1f14;--gray:#4a5568;--grayL:#e2e8f0;
  --white:#fff;--rad:12px;
  --shadow:0 4px 24px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:linear-gradient(150deg,#0c1f14 0%,#173325 60%,#0c1f14 100%);min-height:100vh;color:var(--dark)}

/* ── HEADER ── */
header{background:rgba(10,25,16,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(184,134,46,.35);position:sticky;top:0;z-index:100}
.hdr{max-width:1300px;margin:0 auto;padding:0 1.5rem;height:66px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-ico{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),var(--goldd));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 10px rgba(184,134,46,.4)}
.logo h1{font-size:1.15rem;font-weight:900;color:#fff;line-height:1.1}
.logo p{font-size:.7rem;color:rgba(255,255,255,.55);font-weight:400}
.hbadges{display:flex;gap:6px}
.hb{padding:3px 11px;border-radius:20px;font-size:.7rem;font-weight:700}
.hb-g{background:rgba(26,107,58,.3);color:#5fcf8a;border:1px solid rgba(95,207,138,.3)}
.hb-y{background:rgba(184,134,46,.2);color:var(--goldd);border:1px solid rgba(184,134,46,.3)}

/* ── LAYOUT ── */
main{max-width:1300px;margin:0 auto;padding:1.5rem 1.5rem 4rem;display:grid;grid-template-columns:420px 1fr;gap:1.5rem;align-items:start}
@media(max-width:950px){main{grid-template-columns:1fr}}

/* ── CARDS ── */
.card{background:rgba(255,255,255,.97);border-radius:var(--rad);padding:1.4rem;box-shadow:var(--shadow);margin-bottom:1.2rem}
.card:last-child{margin-bottom:0}
.ct{font-size:.9rem;font-weight:700;color:var(--g);display:flex;align-items:center;gap:7px;border-bottom:2px solid var(--gp);padding-bottom:.65rem;margin-bottom:1rem}
.ct .ico{font-size:1.1rem}

/* ── FORM ── */
.fg{margin-bottom:.85rem}
label{display:block;font-size:.78rem;font-weight:700;color:var(--gray);margin-bottom:.3rem}
input,select,textarea{width:100%;padding:9px 13px;border:1.5px solid var(--grayL);border-radius:8px;font-family:'Cairo',sans-serif;font-size:.88rem;color:var(--dark);background:#fafafa;transition:.2s;direction:rtl}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gl);box-shadow:0 0 0 3px rgba(26,107,58,.1);background:#fff}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
textarea.words{background:linear-gradient(135deg,#f0faf4,#e8f5ee);border-color:var(--gl);color:var(--g);font-weight:600;font-size:.82rem;resize:none;min-height:44px}

/* ── BANK TABS ── */
.banks{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin-bottom:.9rem}
.bk{padding:9px 5px;border:2px solid var(--grayL);border-radius:8px;background:#fafafa;cursor:pointer;text-align:center;font-family:'Cairo',sans-serif;font-size:.72rem;font-weight:700;color:var(--gray);transition:.2s;line-height:1.3}
.bk:hover{border-color:var(--gl);background:var(--gp)}
.bk.active{border-color:var(--g);background:var(--gp);color:var(--g)}
.bk .bi{font-size:1.3rem;display:block;margin-bottom:2px}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2.5px dashed var(--grayL);border-radius:10px;padding:1.2rem;text-align:center;cursor:pointer;transition:.2s;background:#fafafa;position:relative;overflow:hidden}
.upload-zone:hover{border-color:var(--gl);background:var(--gp)}
.upload-zone.has-img{border-style:solid;border-color:var(--g)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:2rem;margin-bottom:.3rem;display:block}
.upload-text{font-size:.82rem;color:var(--gray);font-weight:600}
.upload-hint{font-size:.72rem;color:#aaa;margin-top:.2rem}
.img-preview{max-width:100%;max-height:80px;border-radius:6px;margin-top:.5rem;display:none}

/* ── TOGGLE ── */
.trow{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.tlbl{font-size:.82rem;font-weight:700;color:var(--gray)}
.tog{position:relative;width:42px;height:23px}
.tog input{opacity:0;width:0;height:0}
.ts{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:23px;transition:.3s}
.ts::before{content:'';position:absolute;width:17px;height:17px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.tog input:checked+.ts{background:var(--g)}
.tog input:checked+.ts::before{transform:translateX(19px)}

/* ── BTNS ── */
.btn-print{width:100%;padding:13px;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;border:none
